services:
  sprite-manager:
    build: .
    container_name: sprite-sheet-manager
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      BIND_HOST: 127.0.0.1
      SERVE_STATIC: "false"
    volumes:
      - sprite-data:/app/data
    ports:
      # Frontend only (nginx :80). Backend API is internal via nginx proxy.
      - "3000:80"

volumes:
  sprite-data:
