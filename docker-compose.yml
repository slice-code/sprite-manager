services:
  sprite-manager:
    build: .
    container_name: sprite-sheet-manager
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      BIND_HOST: 127.0.0.1
      SERVE_STATIC: "false"
    volumes:
      - sprite-data:/app/data
    ports:
      # Frontend & Backend API via nginx on port 3001
      - "3001:3001"

volumes:
  sprite-data:
